<!DOCTYPE html>
<html>
  <head>
    <title>Grids</title>
  </head>
  <body>
 
    <div style=
      "display:grid;
      grid-template-columns:100px 100px;
      margin-top:30px">
      <div style="background-color:lightblue;"> div 1</div>
      <div style="background-color:lightcoral"> div 2 ><p>This is a div</p></div>
    </div>
    
    <div style=
      "display:grid;
      grid-template-columns:100px 100px;
      margin-top:30px;">
      <div style="background-color:lightblue;"> div 1</div>
      <div style="background-color:lightcoral"> div 2 ><p>This is a div</p></div>
    </div>
    
    <div style=
      "display:grid;
      grid-template-columns:100px 1fr 1fr;
      margin-top:30px;">
      <div style="background-color:lightblue;"> div 1</div>
      <div style="background-color:lightcoral"> 1fr </div>
      <div style="background-color:lightblue"> 1fr </div>
    </div>
    
  </body>
</html>
