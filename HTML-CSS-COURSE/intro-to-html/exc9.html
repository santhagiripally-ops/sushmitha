<!DOCTYPE html>
<html>
  <head>
    <title>
      div 
      </title>
      <style>
        .square{
         width:80px;
         height:80px;
         background-color:green;
         border:none;
         margin:50px;
        }
        .circle{
          width:100px;
          height:100px;
          background-color:red;
          margin:50px;
          border-radius: 50px;
         
          }
        .circle:hover{
          width:150px;
          height:100px;
          border: 2px solid black;
          cursor:pointer;
        }
        .sc{
          display: flex;
          align-items: center;
          border: 2px solid black;
          border-radius:7px;
          width:500px;
          margin-bottom:30px;
        }
        .full{
          display: flex;
          align-items: center;
          margin:20px;
          padding:200px;
        }
        .service{
          width: 300px;
          height:100px;
          border:2px solid black;
          border-radius:5px;
          padding-left:5px;
          margin-left:30px;

        }
        .head{
          font-size: 30px;
          font-weight:bold;
          color:white;
        }
        .ytmusic{
          background-color:black;
          width:400px;
          padding:20px;
          margin-left:20px;
        }
        .desc{
          color:white;
        }
      </style>
  </head>
  <body>
    <div class="full">
      <div class="sc">
       <div class="square"></div>
        <div class="circle"></div>
      </div> 
      <div class="service">
        <p>
          satisfied with our service?
        </p>
        <button>yes</button>
        <button>No</button>
      </div>
    
      <div class="ytmusic">
        <p class="head">Install YouTube Music</p>
        <p class="desc">Add YouTube Music to your desktop for quick and easy access.</p>
      </div>
    </div>
  </body>
 
</html>
